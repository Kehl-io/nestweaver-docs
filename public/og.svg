<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Raptor gradients (remapped IDs to avoid conflicts) -->
    <linearGradient id="og-mainGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a6ebd"/>
      <stop offset=".5" stop-color="#0652a0"/>
      <stop offset="1" stop-color="#5a0e82"/>
    </linearGradient>
    <linearGradient id="og-accentGrad" x1="0" y1="256" x2="512" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2d9a00"/>
      <stop offset="1" stop-color="#0a6ebd"/>
    </linearGradient>
    <linearGradient id="og-bodyGrad" x1="256" y1="40" x2="256" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a6ebd"/>
      <stop offset=".4" stop-color="#0652a0"/>
      <stop offset="1" stop-color="#5a0e82"/>
    </linearGradient>
    <linearGradient id="og-wingGradL" x1="20" y1="90" x2="256" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a6ebd"/>
      <stop offset="1" stop-color="#0652a0"/>
    </linearGradient>
    <linearGradient id="og-wingGradR" x1="492" y1="90" x2="256" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a6ebd"/>
      <stop offset="1" stop-color="#0652a0"/>
    </linearGradient>
    <radialGradient id="og-eyeGlowL" cx="235" cy="98" r="22" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2d9a00" stop-opacity=".5"/>
      <stop offset=".5" stop-color="#2d9a00" stop-opacity=".1"/>
      <stop offset="1" stop-color="#2d9a00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="og-eyeGlowR" cx="277" cy="98" r="22" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2d9a00" stop-opacity=".5"/>
      <stop offset=".5" stop-color="#2d9a00" stop-opacity=".1"/>
      <stop offset="1" stop-color="#2d9a00" stop-opacity="0"/>
    </radialGradient>
    <filter id="og-glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="og-strongGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="og-eyeBloom">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feColorMatrix in="b" type="saturate" values="1.5" result="s"/>
      <feMerge><feMergeNode in="s"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Cobalt accent glow behind raptor -->
    <radialGradient id="og-cobaltGlow" cx="310" cy="315" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5ed0fe" stop-opacity=".12"/>
      <stop offset=".6" stop-color="#5ed0fe" stop-opacity=".04"/>
      <stop offset="1" stop-color="#5ed0fe" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#080c14"/>

  <!-- Subtle cobalt glow behind the icon -->
  <circle cx="310" cy="315" r="180" fill="url(#og-cobaltGlow)"/>

  <!-- Cobalt accent line beneath icon -->
  <line x1="200" y1="530" x2="420" y2="530" stroke="#5ed0fe" stroke-width="2" opacity=".4"/>
  <line x1="220" y1="535" x2="400" y2="535" stroke="#5ed0fe" stroke-width="1" opacity=".2"/>

  <!-- Raptor icon scaled to ~200px, centered at ~310,315 -->
  <!-- Scale: 200/512 = 0.390625; translate so center (256,256) maps to (310,315) -->
  <!-- tx = 310 - 256*0.390625 = 310 - 100 = 210 -->
  <!-- ty = 315 - 256*0.390625 = 315 - 100 = 215 -->
  <!-- But the raptor spans 45-450 vertically, center ~247; adjust ty so visual center is at 315 -->
  <!-- Visual center Y = (45+450)/2 = 247.5; 247.5*0.39 = 96.5; ty = 315 - 96.5 = 218.5 -->
  <!-- Visual center X = 256; 256*0.39 = 99.8; tx = 310 - 99.8 = 210.2 -->
  <g transform="translate(210, 218) scale(0.39)">
    <!-- Filled facets -->
    <polygon points="256,45 165,170 20,90" fill="#0652a0" opacity=".12"/>
    <polygon points="165,170 20,90 50,200" fill="#0652a0" opacity=".1"/>
    <polygon points="165,170 50,200 256,270" fill="#0652a0" opacity=".08"/>
    <polygon points="256,45 347,170 492,90" fill="#0652a0" opacity=".12"/>
    <polygon points="347,170 492,90 462,200" fill="#0652a0" opacity=".1"/>
    <polygon points="347,170 462,200 256,270" fill="#0652a0" opacity=".08"/>
    <polygon points="256,45 165,170 256,270" fill="#0652a0" opacity=".1"/>
    <polygon points="256,45 347,170 256,270" fill="#3d1880" opacity=".1"/>
    <polygon points="256,270 185,345 256,450" fill="#3d1880" opacity=".08"/>
    <polygon points="256,270 327,345 256,450" fill="#5a0e82" opacity=".08"/>
    <polygon points="185,345 140,435 256,450" fill="#5a0e82" opacity=".06"/>
    <polygon points="327,345 372,435 256,450" fill="#5a0e82" opacity=".06"/>

    <!-- Edges -->
    <line x1="256" y1="45" x2="20" y2="90" stroke="url(#og-wingGradL)" stroke-width="1.5" opacity=".6"/>
    <line x1="256" y1="45" x2="492" y2="90" stroke="url(#og-wingGradR)" stroke-width="1.5" opacity=".6"/>
    <line x1="60" y1="72" x2="20" y2="90" stroke="#0a6ebd" stroke-width="1.2" opacity=".5"/>
    <line x1="452" y1="72" x2="492" y2="90" stroke="#0a6ebd" stroke-width="1.2" opacity=".5"/>
    <line x1="60" y1="72" x2="100" y2="125" stroke="#0a6ebd" stroke-width="1" opacity=".4"/>
    <line x1="452" y1="72" x2="412" y2="125" stroke="#0a6ebd" stroke-width="1" opacity=".4"/>
    <line x1="256" y1="45" x2="165" y2="170" stroke="url(#og-bodyGrad)" stroke-width="2.5" filter="url(#og-glow)"/>
    <line x1="256" y1="45" x2="347" y2="170" stroke="url(#og-bodyGrad)" stroke-width="2.5" filter="url(#og-glow)"/>
    <line x1="20" y1="90" x2="165" y2="170" stroke="url(#og-mainGrad)" stroke-width="2" filter="url(#og-glow)"/>
    <line x1="492" y1="90" x2="347" y2="170" stroke="url(#og-mainGrad)" stroke-width="2" filter="url(#og-glow)"/>
    <line x1="20" y1="90" x2="50" y2="200" stroke="url(#og-mainGrad)" stroke-width="2" filter="url(#og-glow)"/>
    <line x1="492" y1="90" x2="462" y2="200" stroke="url(#og-mainGrad)" stroke-width="2" filter="url(#og-glow)"/>
    <line x1="50" y1="200" x2="165" y2="170" stroke="url(#og-mainGrad)" stroke-width="1.8" filter="url(#og-glow)"/>
    <line x1="462" y1="200" x2="347" y2="170" stroke="url(#og-mainGrad)" stroke-width="1.8" filter="url(#og-glow)"/>
    <line x1="20" y1="90" x2="347" y2="170" stroke="url(#og-mainGrad)" stroke-width="1" opacity=".15"/>
    <line x1="492" y1="90" x2="165" y2="170" stroke="url(#og-mainGrad)" stroke-width="1" opacity=".15"/>
    <line x1="165" y1="170" x2="347" y2="170" stroke="url(#og-accentGrad)" stroke-width="1.5" opacity=".3"/>
    <line x1="165" y1="170" x2="256" y2="270" stroke="url(#og-bodyGrad)" stroke-width="2.5" filter="url(#og-glow)"/>
    <line x1="347" y1="170" x2="256" y2="270" stroke="url(#og-bodyGrad)" stroke-width="2.5" filter="url(#og-glow)"/>
    <line x1="50" y1="200" x2="256" y2="270" stroke="url(#og-mainGrad)" stroke-width="1.2" opacity=".3"/>
    <line x1="462" y1="200" x2="256" y2="270" stroke="url(#og-mainGrad)" stroke-width="1.2" opacity=".3"/>
    <line x1="256" y1="45" x2="256" y2="270" stroke="url(#og-bodyGrad)" stroke-width="3" filter="url(#og-glow)"/>
    <line x1="256" y1="270" x2="256" y2="450" stroke="url(#og-bodyGrad)" stroke-width="2.5" filter="url(#og-glow)"/>
    <line x1="220" y1="78" x2="235" y2="95" stroke="#2d9a00" stroke-width="2" opacity=".8" filter="url(#og-glow)"/>
    <line x1="292" y1="78" x2="277" y2="95" stroke="#2d9a00" stroke-width="2" opacity=".8" filter="url(#og-glow)"/>
    <line x1="235" y1="98" x2="256" y2="130" stroke="url(#og-bodyGrad)" stroke-width="2" opacity=".8"/>
    <line x1="277" y1="98" x2="256" y2="130" stroke="url(#og-bodyGrad)" stroke-width="2" opacity=".8"/>
    <line x1="256" y1="270" x2="185" y2="345" stroke="url(#og-bodyGrad)" stroke-width="2" filter="url(#og-glow)"/>
    <line x1="256" y1="270" x2="327" y2="345" stroke="url(#og-bodyGrad)" stroke-width="2" filter="url(#og-glow)"/>
    <line x1="185" y1="345" x2="256" y2="450" stroke="url(#og-bodyGrad)" stroke-width="1.8" filter="url(#og-glow)"/>
    <line x1="327" y1="345" x2="256" y2="450" stroke="url(#og-bodyGrad)" stroke-width="1.8" filter="url(#og-glow)"/>
    <line x1="185" y1="345" x2="327" y2="345" stroke="url(#og-mainGrad)" stroke-width="1.2" opacity=".3"/>
    <line x1="185" y1="345" x2="140" y2="435" stroke="url(#og-mainGrad)" stroke-width="1.5" opacity=".4" filter="url(#og-glow)"/>
    <line x1="327" y1="345" x2="372" y2="435" stroke="url(#og-mainGrad)" stroke-width="1.5" opacity=".4" filter="url(#og-glow)"/>
    <line x1="140" y1="435" x2="256" y2="450" stroke="url(#og-mainGrad)" stroke-width="1.2" opacity=".3"/>
    <line x1="372" y1="435" x2="256" y2="450" stroke="url(#og-mainGrad)" stroke-width="1.2" opacity=".3"/>
    <line x1="185" y1="345" x2="160" y2="385" stroke="#0a6ebd" stroke-width="1.5" opacity=".35"/>
    <line x1="160" y1="385" x2="148" y2="370" stroke="#0a6ebd" stroke-width="1.2" opacity=".3"/>
    <line x1="327" y1="345" x2="352" y2="385" stroke="#0a6ebd" stroke-width="1.5" opacity=".35"/>
    <line x1="352" y1="385" x2="364" y2="370" stroke="#0a6ebd" stroke-width="1.2" opacity=".3"/>

    <!-- Nodes -->
    <circle cx="256" cy="45" r="13" fill="url(#og-bodyGrad)" filter="url(#og-strongGlow)"/>
    <circle cx="256" cy="45" r="6" fill="#fff" opacity=".9"/>
    <circle cx="235" cy="98" r="16" fill="url(#og-eyeGlowL)"/>
    <circle cx="277" cy="98" r="16" fill="url(#og-eyeGlowR)"/>
    <circle cx="235" cy="98" r="7" fill="#2d9a00" filter="url(#og-eyeBloom)"/>
    <circle cx="235" cy="98" r="3" fill="#fff" opacity=".9"/>
    <circle cx="277" cy="98" r="7" fill="#2d9a00" filter="url(#og-eyeBloom)"/>
    <circle cx="277" cy="98" r="3" fill="#fff" opacity=".9"/>
    <circle cx="220" cy="78" r="4" fill="#0a6ebd" opacity=".7"/>
    <circle cx="292" cy="78" r="4" fill="#0a6ebd" opacity=".7"/>
    <circle cx="256" cy="130" r="5" fill="url(#og-bodyGrad)" filter="url(#og-glow)"/>
    <circle cx="256" cy="130" r="2.5" fill="#0a6ebd" opacity=".8"/>
    <circle cx="20" cy="90" r="9" fill="url(#og-mainGrad)" filter="url(#og-glow)"/>
    <circle cx="20" cy="90" r="4" fill="#0a6ebd" opacity=".8"/>
    <circle cx="492" cy="90" r="9" fill="url(#og-mainGrad)" filter="url(#og-glow)"/>
    <circle cx="492" cy="90" r="4" fill="#0a6ebd" opacity=".8"/>
    <circle cx="60" cy="72" r="4" fill="#0a6ebd" opacity=".5"/>
    <circle cx="452" cy="72" r="4" fill="#0a6ebd" opacity=".5"/>
    <circle cx="100" cy="125" r="5" fill="url(#og-mainGrad)" opacity=".6"/>
    <circle cx="412" cy="125" r="5" fill="url(#og-mainGrad)" opacity=".6"/>
    <circle cx="165" cy="170" r="11" fill="url(#og-mainGrad)" filter="url(#og-glow)"/>
    <circle cx="165" cy="170" r="5" fill="#fff" opacity=".5"/>
    <circle cx="347" cy="170" r="11" fill="url(#og-mainGrad)" filter="url(#og-glow)"/>
    <circle cx="347" cy="170" r="5" fill="#fff" opacity=".5"/>
    <circle cx="50" cy="200" r="7" fill="url(#og-mainGrad)" filter="url(#og-glow)"/>
    <circle cx="50" cy="200" r="3.5" fill="#0a6ebd" opacity=".7"/>
    <circle cx="462" cy="200" r="7" fill="url(#og-mainGrad)" filter="url(#og-glow)"/>
    <circle cx="462" cy="200" r="3.5" fill="#0a6ebd" opacity=".7"/>
    <circle cx="256" cy="270" r="15" fill="url(#og-mainGrad)" filter="url(#og-strongGlow)"/>
    <circle cx="256" cy="270" r="8" fill="url(#og-accentGrad)"/>
    <circle cx="256" cy="270" r="3.5" fill="#fff" opacity=".85"/>
    <circle cx="185" cy="345" r="9" fill="url(#og-bodyGrad)" filter="url(#og-glow)"/>
    <circle cx="185" cy="345" r="4" fill="#0a6ebd" opacity=".6"/>
    <circle cx="327" cy="345" r="9" fill="url(#og-bodyGrad)" filter="url(#og-glow)"/>
    <circle cx="327" cy="345" r="4" fill="#0a6ebd" opacity=".6"/>
    <circle cx="256" cy="450" r="10" fill="url(#og-bodyGrad)" filter="url(#og-glow)"/>
    <circle cx="256" cy="450" r="5" fill="#5a0e82" opacity=".8"/>
    <circle cx="140" cy="435" r="5" fill="url(#og-mainGrad)" opacity=".5"/>
    <circle cx="372" cy="435" r="5" fill="url(#og-mainGrad)" opacity=".5"/>
    <circle cx="160" cy="385" r="4" fill="#0a6ebd" opacity=".4"/>
    <circle cx="148" cy="370" r="3" fill="#0a6ebd" opacity=".3"/>
    <circle cx="352" cy="385" r="4" fill="#0a6ebd" opacity=".4"/>
    <circle cx="364" cy="370" r="3" fill="#0a6ebd" opacity=".3"/>
  </g>

  <!-- Text content -->
  <text x="500" y="290" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-0.5">NestWeaver Docs</text>
  <text x="500" y="340" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif" font-size="24" font-weight="400" fill="#b0bec5">Code intelligence knowledge graph for AI agents</text>

  <!-- Subtle cobalt accent line under the title text -->
  <line x1="500" y1="360" x2="720" y2="360" stroke="#5ed0fe" stroke-width="2" opacity=".35"/>
</svg>
